name: Telegram Bot Worker

on:
  repository_dispatch:
    types: [process_telegram_message]

jobs:
  process-message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r web-portal/api/requirements.txt

      - name: Create Dummy Config Env for GitHub
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          # Vercel env'leri zaten webhook üzerinden tetikleyecek,
          # ancak GitHub'da da firebase ve telegram yetkileri için
          # secret'ları ayarlayacağız.
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> web-portal/api/config.env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> web-portal/api/config.env
          echo "GEMINI_API_KEYS=${{ secrets.GEMINI_API_KEYS }}" >> web-portal/api/config.env
          echo "$FIREBASE_SECRET" > web-portal/api/serviceAccountKey.json

      - name: Run Telegram Worker
        env:
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
        run: |
          python web-portal/api/github_worker.py
